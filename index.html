<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детская Мега-Энциклопедия: 100 Английских Слов</title>
    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            padding: 30px 10px;
            text-align: center;
            color: #334155;
        }

        h1 {
            color: #0284c7;
            font-size: 42px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #e0f2fe;
        }

        .subtitle {
            font-size: 20px;
            color: #64748b;
            margin-bottom: 35px;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 28px;
            margin: 20px 0;
            padding: 5px 15px;
            border-bottom: 4px dashed #cbd5e1;
            display: inline-block;
            color: #1e293b;
            font-weight: bold;
        }

        .grid-container {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 15px;
            width: 150px;
            text-align: center;
            box-shadow: 0 8px 0px #e2e8f0, 0 12px 15px -5px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            user-select: none;
            border: 4px solid #cbd5e1; /* Базовый цвет */
        }

        /* Динамические цвета рамок по категориям */
        .card[data-cat="animals"] { border-color: #f97316; }
        .card[data-cat="things"] { border-color: #3b82f6; }
        .card[data-cat="professions"] { border-color: #a855f7; }
        .card[data-cat="food"] { border-color: #22c55e; }
        .card[data-cat="colors"] { border-color: #ec4899; }
        .card[data-cat="nature"] { border-color: #06b6d4; }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0px #e2e8f0, 0 18px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .card:active, .card.playing {
            transform: translateY(5px);
            box-shadow: 0 3px 0px #e2e8f0, 0 6px 8px -5px rgba(0, 0, 0, 0.08);
            background-color: #f8fafc;
        }

        .emoji {
            font-size: 65px;
            margin-bottom: 8px;
            display: block;
        }

        .word {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 6px;
            word-wrap: break-word;
        }

        /* Цвета текста слов */
        .card[data-cat="animals"] .word { color: #ea580c; }
        .card[data-cat="things"] .word { color: #2563eb; }
        .card[data-cat="professions"] .word { color: #9333ea; }
        .card[data-cat="food"] .word { color: #16a34a; }
        .card[data-cat="colors"] .word { color: #db2777; }
        .card[data-cat="nature"] .word { color: #0891b2; }

        .translations {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 5px 2px;
            font-size: 13px;
            font-weight: bold;
        }

        .trans-ru { color: #475569; margin-bottom: 1px; }
        .trans-uz { color: #0284c7; }
    </style>
</head>

        // АВТОМАТИЧЕСКАЯ СБОРКА САЙТА ИЗ БАЗЫ ДАННЫХ
        const container = document.getElementById('main-content');
        let currentCategory = "";
        let currentGrid = null;

        database.forEach(item => {
            // Если началась новая категория — создаем заголовок и сетку
            if (item.catName && item.catName !== currentCategory) {
                currentCategory = item.catName;
                
                const section = document.createElement('div');
                section.className = 'category-section';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = item.catName;
                section.appendChild(title);
                
                currentGrid = document.createElement('div');
                currentGrid.className = 'grid-container ' + item.cat;
                section.appendChild(currentGrid);
                
                container.appendChild(section);
            }

            // Создаем саму карточку
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-cat', item.cat);
            card.onclick = function() { play(item.eng, this); };

            card.innerHTML = `
                <span class="emoji">${item.emoji}</span>
                <div class="word">${item.eng}</div>
                <div class="translations">
                    <div class="trans-ru">${item.ru}</div>
                    <div class="trans-uz">${item.uz}</div>
                </div>
            `;

            if (currentGrid) {
                currentGrid.appendChild(card);
            }
        });

        // ФУНКЦИЯ ОНЛАЙН-ОЗВУЧКИ
        function play(wordName, cardElement) {
            cardElement.classList.add('playing');
            setTimeout(() => cardElement.classList.remove('playing'), 120);

            var audioUrl = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(wordName) + '&type=2';
            var audio = new Audio(audioUrl);
            
            audio.play().catch(function(error) {
                console.error("Ошибка воспроизведения звука:", error);
            });
        }
